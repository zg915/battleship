services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: battleship
      POSTGRES_PASSWORD: battleship
      POSTGRES_DB: battleship
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battleship"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://battleship:battleship@db:5432/battleship
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
